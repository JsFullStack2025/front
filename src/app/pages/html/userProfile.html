<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Page</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@3.0.3/dist/tailwind.min.js"></script>
    <style>
        /* Add a custom gradient background */
        .bg-gradient {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
        }
    </style>
</head>

<body class="bg-gradient text-white font-sans">
    <div class="flex justify-between p-8">
        <!-- Left Section: User Profile -->
        <div class="bg-white text-gray-800 p-6 rounded-lg w-1/3">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Редактировать</h2>
                <button class="text-sm bg-indigo-500 px-4 py-2 rounded-full text-white">Сохранить</button>
            </div>
            <div class="flex justify-center mb-6">
                <img class="w-32 h-32 rounded-full border-2 border-indigo-500" src="https://via.placeholder.com/150" alt="Profile Picture">
            </div>
            <div class="mb-4">
                <label for="name" class="block text-sm">Ф.И.О.</label>
                <input type="text" id="name" class="w-full p-2 mt-2 rounded-lg border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Введите имя">
            </div>
            <div class="mb-4">
                <label for="position" class="block text-sm">Должность/обязанности</label>
                <input type="text" id="position" class="w-full p-2 mt-2 rounded-lg border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Введите должность">
            </div>
            <div class="mb-4">
                <label for="phone" class="block text-sm">Номер телефона</label>
                <input type="tel" id="phone" class="w-full p-2 mt-2 rounded-lg border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Введите номер телефона">
            </div>
            <div class="mb-4">
                <label for="website" class="block text-sm">Веб-сайт</label>
                <input type="url" id="website" class="w-full p-2 mt-2 rounded-lg border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Введите веб-сайт">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-sm">Электронная почта</label>
                <input type="email" id="email" class="w-full p-2 mt-2 rounded-lg border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Введите электронную почту">
            </div>
        </div>

        <!-- Right Section: Projects List -->
        <div class="bg-white text-gray-800 p-6 rounded-lg w-2/3">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Проекты</h2>
                <button class="text-sm bg-indigo-500 px-4 py-2 rounded-full text-white">+ Новый проект</button>
            </div>
            <ul>
                <li class="flex justify-between items-center mb-4">
                    <span>Проект 1</span>
                    <button class="text-blue-500">Редактировать</button>
                </li>
                <li class="flex justify-between items-center mb-4">
                    <span>Проект 2</span>
                    <button class="text-blue-500">Редактировать</button>
                </li>
                <li class="flex justify-between items-center mb-4">
                    <span>Проект 3</span>
                    <button class="text-blue-500">Редактировать</button>
                </li>
                <li class="flex justify-between items-center mb-4">
                    <span>Проект 4</span>
                    <button class="text-blue-500">Редактировать</button>
                </li>
                <li class="flex justify-between items-center mb-4">
                    <span>Проект 5</span>
                    <button class="text-blue-500">Редактировать</button>
                </li>
            </ul>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-sm mt-10 pb-4">
        <p>Все права защищены @ 2025, Visiteo.RU</p>
    </footer>
</body>

</html>
